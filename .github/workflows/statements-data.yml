name: Statements snapshot

# Financial statements change at most quarterly; a weekly fetch keeps the
# snapshot fresh without hammering Yahoo. Saturday 03:00 UTC = 06:00 AST,
# during the Saudi weekend (Fri-Sat) when nothing else is moving.
on:
  schedule:
    - cron: '0 3 * * 6'
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - 'scripts/fetch_statements.mjs'
      - '.github/workflows/statements-data.yml'

permissions:
  contents: write

concurrency:
  group: statements-data
  cancel-in-progress: false

jobs:
  fetch:
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-node@v5
        with:
          node-version: 24

      - name: Fetch financial statements from Yahoo Finance
        run: node scripts/fetch_statements.mjs

      - name: Commit snapshot if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/statements_snapshot.json
          if git diff --cached --quiet; then
            echo "No changes to commit"
          else
            git commit -m "chore: statements snapshot $(date -u +'%Y-%m-%d %H:%M UTC')"
            git pull --rebase origin main
            git push origin main
          fi
