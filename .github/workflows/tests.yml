name: Tests

on:
  push:
    branches: [main]
    paths:
      - 'TASI_Dashboard.html'
      - 'tests/**'
      - '.github/workflows/tests.yml'
  pull_request:
    paths:
      - 'TASI_Dashboard.html'
      - 'tests/**'

permissions:
  contents: read

jobs:
  unit:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-node@v5
        with:
          node-version: 24

      - name: Run unit tests
        run: node tests/run_tests.mjs
